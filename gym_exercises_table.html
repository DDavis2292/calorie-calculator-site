
<h2 class="sr-only">100 popular gym exercises with primary and secondary muscle groups</h2>
<div style="padding: 1rem 0;">
<div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem;">
  <input type="text" id="search" placeholder="Search exercises..." style="flex: 1; min-width: 200px;" oninput="filterTable()">
  <select id="muscle-filter" onchange="filterTable()" style="min-width: 160px;">
    <option value="">All muscle groups</option>
  </select>
</div>
<div style="overflow-x: auto;">
<table id="exercise-table" style="width: 100%; border-collapse: collapse; font-size: 14px; table-layout: fixed;">
  <colgroup>
    <col style="width: 5%">
    <col style="width: 28%">
    <col style="width: 22%">
    <col style="width: 45%">
  </colgroup>
  <thead>
    <tr style="border-bottom: 1px solid var(--color-border-tertiary);">
      <th style="padding: 8px 6px; text-align: left; font-size: 12px; color: var(--color-text-secondary); font-weight: 500;">#</th>
      <th style="padding: 8px 6px; text-align: left; font-size: 12px; color: var(--color-text-secondary); font-weight: 500;">Exercise</th>
      <th style="padding: 8px 6px; text-align: left; font-size: 12px; color: var(--color-text-secondary); font-weight: 500;">Primary muscle</th>
      <th style="padding: 8px 6px; text-align: left; font-size: 12px; color: var(--color-text-secondary); font-weight: 500;">Secondary muscles</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>
</div>
<p id="count" style="font-size: 12px; color: var(--color-text-secondary); margin-top: 8px;"></p>
</div>

const primarySet = [...new Set(exercises.map(e => e[1]))].sort();
const sel = document.getElementById('muscle-filter');
primarySet.forEach(m => {
  const opt = document.createElement('option');
  opt.value = m; opt.textContent = m;
  sel.appendChild(opt);
});

function renderRows(data) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = data.map((e, i) => `
    <tr style="border-bottom: 0.5px solid var(--color-border-tertiary);">
      <td style="padding: 8px 6px; color: var(--color-text-secondary); font-size: 12px;">${i+1}</td>
      <td style="padding: 8px 6px; font-weight: 500; color: var(--color-text-primary);">${e[0]}</td>
      <td style="padding: 8px 6px; color: var(--color-text-primary);">${e[1]}</td>
      <td style="padding: 8px 6px; color: var(--color-text-secondary); font-size: 13px;">${e[2]}</td>
    </tr>`).join('');
  document.getElementById('count').textContent = `${data.length} exercises`;
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const m = document.getElementById('muscle-filter').value;
  const filtered = exercises.filter(e =>
    (!q || e[0].toLowerCase().includes(q) || e[1].toLowerCase().includes(q) || e[2].toLowerCase().includes(q)) &&
    (!m || e[1] === m)
  );
  renderRows(filtered);
}

renderRows(exercises);
</script>
