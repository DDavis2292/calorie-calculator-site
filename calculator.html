<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Calculator</title>
</head>
<body>
    <header>
        <nav class="drop-down">
            <h1>Calorie Calculator</h1>
        </nav>
    </header>
    <main>
        <div class="main-title">
            <h2>Calorie Calculator</h2>
            <p>Calculate your daily calories and macro nutrients</p>
        </div>
        <form>
            <div class="form-group">
                <label for="age" >AGE</label>
                <input type="number" id="age" placeholder="Enter your age">
            </div>
            <div class="formgroup">
                <label for="sex">SEX</label>
                <div class="radio-group">
                    <input type="radio" id="male" name="sex" value="male">
                    <label for="male">Male</label>

                    <input type="radio" id="female" name="sex" value="female">
                    <label for="male">Female</label>
                </div>
            </div>
            <div class="form-group">
                <label>HEIGHT</label>
            </div>
            <div class="height-input">
                <input type="number" id="feet" placeholder="ft">
                <input type="number" id="inches" placeholder="in">
            </div>
            <div class="form-group">
                <label>WEIGHT</label>
                <input type="number" id="weight" placeholder="lbs">
            </div>
            <div class="form-group">
                <label>ACTIVITY LEVEL</label>
                <select id="activity">
                    <option value="sedentary">Sedentary (little or no exercise)</option>
                    <option value="light">Light (1-3 times/week)</option>
                    <option value="moderate">Moderate (4-5 times/week)</option>
                    <option value="active">Active (daily exercise or intense exercise 3-4 times/week)</option>
                    <option value="very-active">Very Active (intense exercise 6-7 times/week)</option>
                </select>
            </div>
            <div class="form-group">
                <label>GOAL</label>
                <select id="goal">
                    <option value="gain">Gain Weight</option>
                    <option value="maintain">Maintain Weight</option>
                    <option value="lose">Lose Weight</option>
                </select>
            </div>
            <div class="form-group">
                <label>MACRONUTRIENT BALANCE</label>
                <select id="nutrients">
                    <option value="balanced">Balanced</option>
                    <option value="high-protein">High Protein (build/maintain muscle)</option>
                    <option value="high-fat">High Fat (keto)</option>
                    <option value="high-carb">High Carbohydrate (endurance athlete)</option>
                </select>
            </div>

            <button type="submit">CALCULATE MY CALORIES</button> 
        </form>
        <div class="exercise-info">
            <ul>
                <li><strong>Exercise: </strong>15-30 minutes of elevated heart rate activity.</li>
                <li><strong>Intense exercise: </strong>45-120 minutes of elevated heart rate activity.</li>
                <li><strong>Very intense exercise: </strong>2+ hours of elevated heart rate activity</li>
            </ul>
        </div>
    </main>
</body>
</html>
