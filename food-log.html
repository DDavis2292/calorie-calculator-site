<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Log</title>
</head>
<body>

    <main>

        <!-- MAIN CALORIE BUDGET CARD -->


        <div class="main-title">
                <h2>Food Log</h2>
                <p>Log your daily food intake</p>
        </div>

        <div class="budget-card">
            <p class="budget-label">Calorie Budget</p>
            <p class="budget-total">2,500 </p>

    <!-- CALORIE BUDGET RING -->

            <div class="ring-container">
                <svg viewBox="0 0 100 100" class="progress-ring">
                    <circle class="ring-track" cx="50" cy="50" r="40"/>
                    <circle class="ring-progress" cx="50" cy="50" r="40"/>
                </svg>
                <div class="ring-center">
                    <span class="calories-consumed">1,900</span>
                    <span class="ring-label">Left</span>
                    <span class="calories-left">600</span>
                </div>
            </div>

    <!-- MEAL CALORIES PROGRESS SIDEBAR -->
            
            <div class="meal-breakdown">
                <div class="meal-row">
                    <span>Breakfast</span>
                    <span class="meal-cal">625</span>
                </div>
                <div class="meal-row">
                    <span>Lunch</span>
                    <span class="meal-cal">625</span>
                </div>
                <div class="meal-row">
                    <span>Dinner</span>
                    <span class="meal-cal">625</span>
                </div>
                <div class="meal-row">
                    <span>Snacks</span>
                    <span class="meal-cal">625</span>
                </div>
            </div>

    <!-- MACRO PROGRESS SECTION -->

            <div class="macros">
                <div class="macro">
                    <span class="macro-label">Carbs</span>
                    <span class="macro-value">20g / 145</span>
                </div>
                <div class="macro">
                    <span class="macro-label">Protein</span>
                    <span class="macro-value">175g / 230g</span>
                </div>
                <div class="macro">
                    <span class="macro-label">Fat</span>
                    <span class="macro-value">76g / 95g</span>
                </div>

            </div>
        </div>

            <!-- FOOD SEARCH SECTION -->
        <div class="food-search">
            <label for="search-bar">Search Food</label>
            <input type="text" id="search-bar"/>
        </div>

            <!-- MEALS SECTION -->

        <section class="meals">
            <div class="section-title">
                <h2>Meals</h2>
            </div>

    <!-- BREAKFAST -->

            <div class="meal-section" id="breakfast">
                <div class="mealheader">
                    <h3>Breakfast</h3>
                    <span class="meal-calories">0 cal</span>
                </div>
                <div class="meal-items" id="breakfast-items">
                    <!-- This is where my food items should append with js -->
                </div>
            </div>

    <!-- LUNCH -->

            <div class="meal-section" id="lunch">
                <div class="mealheader">
                    <h3>Lunch</h3>
                    <span class="meal-calories">0 cal</span>
                </div>
                <div class="meal-items" id="lunch-items">
                    <!-- This is where my food items should append with js -->
                </div>
            </div>

    <!-- DINNER -->

            <div class="meal-section" id="dinner">
                <div class="mealheader">
                    <h3>Dinner</h3>
                    <span class="meal-calories">0 cal</span>
                </div>
                <div class="meal-items" id="dinner-items">
                    <!-- This is where my food items should append with js -->
                </div>
            </div>

    <!-- SNACKS -->

            <div class="meal-section" id="snack">
                <div class="mealheader">
                    <h3>Snack</h3>
                    <span class="meal-calories">0 cal</span>
                </div>
                <div class="meal-items" id="snack-items">
                    <!-- This is where my food items should append with js -->
                </div>
            </div>
        </section>  
    </main>    
</body>
</html>
